<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator + Timer</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #586a8b, #182335);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 30px;
        flex-wrap: wrap;
    }

    .card {
        width: 320px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        color: white;
    }

    h2 {
        text-align: center;
        margin-bottom: 15px;
        font-weight: 500;
    }

    /* Calculator */
    #display {
        width: 100%;
        height: 55px;
        font-size: 22px;
        text-align: right;
        border: none;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 15px;
        outline: none;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .op { background: #ff9f43; color: white; }
    .eq { background: #2ecc71; color: white; }
    .clear { background: #e74c3c; color: white; }
    .num { background: rgba(255,255,255,0.2); color: white; }

    /* Timer */
    .time {
        font-size: 42px;
        text-align: center;
        margin: 20px 0;
        letter-spacing: 2px;
    }

    .timer-buttons {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .timer-buttons button {
        flex: 1;
        background: rgba(255,255,255,0.2);
        color: white;
    }

    .timer-buttons button:hover {
        background: rgba(255,255,255,0.35);
    }
</style>
</head>

<body>

<!-- Calculator -->
<div class="card">
    <h2>Calculator</h2>
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="op" onclick="append('*')">*</button>
        <button class="op" onclick="del()">←</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('-')">-</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="eq" onclick="calc()">=</button>

        <button class="num" style="grid-column: span 2;" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
    </div>
</div>

<!-- Timer -->
<div class="card">
    <h2>Timer Counter</h2>
    <div class="time" id="time">00:00:00</div>

    <div class="timer-buttons">
        <button onclick="start()">Start</button>
        <button onclick="stop()">Stop</button>
        <button onclick="reset()">Reset</button>
    </div>
</div>

<script>
/* Calculator */
let display = document.getElementById("display");

function append(v) {
    display.value += v;
}

function clearDisplay() {
    display.value = "";
}

function del() {
    display.value = display.value.slice(0, -1);
}

function calc() {
    try {
        display.value = eval(display.value);
    } catch {
        alert("Invalid Input");
    }
}

/* Timer */
let sec = 0;
let interval = null;

function update() {
    let h = Math.floor(sec / 3600);
    let m = Math.floor((sec % 3600) / 60);
    let s = sec % 60;

    document.getElementById("time").innerText =
        String(h).padStart(2,'0') + ":" +
        String(m).padStart(2,'0') + ":" +
        String(s).padStart(2,'0');
}

function start() {
    if (!interval) {
        interval = setInterval(() => {
            sec++;
            update();
        }, 1000);
    }
}

function stop() {
    clearInterval(interval);
    interval = null;
}

function reset() {
    stop();
    sec = 0;
    update();
}
</script>

</body>
</html>
